app:
  description: Clean core workflow rebuilt from the latest export without
    retrieval, follow-up, or FHIR branches.
  icon: robot
  icon_background: "#FFEAD5"
  icon_type: emoji
  mode: advanced-chat
  name: AI_Chat_Companion_Clean_Core
  use_icon_as_answer_icon: false
dependencies:
  - current_identifier: null
    type: marketplace
    value:
      marketplace_plugin_unique_identifier: langgenius/groq:0.0.13@40bd415a13ff29ed4718de161fba152b4d829da43ced05222c1397514482c08f
      version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables:
    - description: Store the latest clarification question so the next turn can answer it
      id: pending-question-var
      name: pending_question
      selector:
        - conversation
        - pending_question
      value: none
      value_type: string
    - description: Whether the latest user turn hit a red flag path
      id: risk-flag-var
      name: risk_flag
      selector:
        - conversation
        - risk_flag
      value: "false"
      value_type: string
    - description: Structured JSON-like summary for the latest detected red flag
      id: red-flag-payload-var
      name: red_flag_payload
      selector:
        - conversation
        - red_flag_payload
      value: none
      value_type: string
    - description: Number of consecutive clarification turns in the current follow-up chain
      id: followup-turn-count-var
      name: followup_turn_count
      selector:
        - conversation
        - followup_turn_count
      value: "0"
      value_type: string
    - description: Current follow-up lifecycle state
      id: followup-status-var
      name: followup_status
      selector:
        - conversation
        - followup_status
      value: none
      value_type: string
    - description: Last resolved routing mode for the current turn
      id: active-mode-var
      name: active_mode
      selector:
        - conversation
        - active_mode
      value: auto
      value_type: string
    - description: Structured tag output for the latest normal user turn
      id: latest-tag-payload-var
      name: latest_tag_payload
      selector:
        - conversation
        - latest_tag_payload
      value: none
      value_type: string
    - description: Structured HAM-D progress snapshot for mission mode
      id: hamd-progress-state-var
      name: hamd_progress_state
      selector:
        - conversation
        - hamd_progress_state
      value: none
      value_type: string
    - description: Persisted manual routing mode override; auto means automatic routing
      id: routing-mode-override-var
      name: routing_mode_override
      selector:
        - conversation
        - routing_mode_override
      value: auto
      value_type: string
    - description: Short confirmation text for command-mode switches
      id: command-feedback-var
      name: command_feedback
      selector:
        - conversation
        - command_feedback
      value: none
      value_type: string
    - description: Retrieval governance snapshot for mission mode knowledge usage
      id: mission-retrieval-audit-var
      name: mission_retrieval_audit
      selector:
        - conversation
        - mission_retrieval_audit
      value: none
      value_type: string
    - description: Structured burden and response-style state for cognitive load aware
        routing and replies
      id: burden-level-state-var
      name: burden_level_state
      selector:
        - conversation
        - burden_level_state
      value: none
      value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
        - .JPG
        - .JPEG
        - .PNG
        - .GIF
        - .WEBP
        - .SVG
      allowed_file_types:
        - image
      allowed_file_upload_methods:
        - local_file
        - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
          - local_file
          - remote_url
      number_limits: 3
    opening_statement: ""
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ""
      voice: ""
