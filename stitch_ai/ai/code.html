<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#a83836",
              "surface": "#f6fafe",
              "surface-container-high": "#e0e9f0",
              "inverse-on-surface": "#999da1",
              "surface-bright": "#f6fafe",
              "surface-dim": "#d0dce3",
              "on-error": "#fff7f6",
              "primary": "#446655",
              "surface-container": "#e7eff5",
              "on-tertiary-container": "#612e15",
              "tertiary-fixed-dim": "#eda180",
              "secondary-dim": "#3a5768",
              "error-container": "#fa746f",
              "primary-fixed": "#c6ebd5",
              "primary-container": "#c6ebd5",
              "tertiary-container": "#fdaf8c",
              "outline-variant": "#a8b4bb",
              "secondary-container": "#c8e7fb",
              "on-surface-variant": "#566167",
              "on-primary-fixed": "#254636",
              "outline": "#717c83",
              "surface-container-low": "#eef4f9",
              "on-tertiary": "#fff7f5",
              "background": "#f6fafe",
              "surface-tint": "#446655",
              "on-primary-fixed-variant": "#416351",
              "primary-dim": "#395a49",
              "on-secondary-container": "#385566",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#d9e4eb",
              "on-tertiary-fixed-variant": "#6c371d",
              "on-secondary-fixed-variant": "#425f70",
              "on-primary-container": "#375948",
              "primary-fixed-dim": "#b8ddc7",
              "on-background": "#29343a",
              "inverse-primary": "#d6fde6",
              "secondary-fixed-dim": "#bad9ed",
              "on-primary": "#e6ffef",
              "tertiary-fixed": "#fdaf8c",
              "inverse-surface": "#0a0f12",
              "error-dim": "#67040d",
              "on-error-container": "#6e0a12",
              "on-surface": "#29343a",
              "surface-variant": "#d9e4eb",
              "tertiary": "#8b4f34",
              "on-secondary": "#f4faff",
              "tertiary-dim": "#7d4429",
              "secondary-fixed": "#c8e7fb",
              "on-secondary-fixed": "#254353",
              "on-tertiary-fixed": "#471a03",
              "secondary": "#466374"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .chat-gradient {
        background: linear-gradient(180deg, #f6fafe 0%, #e7eff5 100%);
      }
      .orb-glow {
        filter: blur(40px);
        opacity: 0.4;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50 flex items-center justify-between px-6 py-4 w-full shadow-[0_8px_24px_rgba(41,52,58,0.06)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary-container to-secondary-container flex items-center justify-center overflow-hidden relative border-2 border-white">
<div class="absolute inset-0 bg-primary-container animate-pulse-slow orb-glow"></div>
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div>
<h1 class="text-emerald-900 dark:text-emerald-50 font-bold tracking-tighter font-headline text-lg">Rou Rou</h1>
<div class="flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] text-on-surface-variant font-medium tracking-widest uppercase">陪伴中</span>
<span class="w-px h-2.5 bg-outline-variant/30 mx-0.5"></span>
<span class="text-[10px] text-on-surface-variant/80 font-medium tracking-wide">模式：自然聊天</span>
</div>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings_heart">settings_heart</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-6 py-8 space-y-8 relative chat-gradient">
<!-- Smart Hunter Subtle Indicator (Background/Layered) -->
<div class="absolute top-4 right-6 opacity-30 flex items-center gap-2 pointer-events-none">
<span class="text-[10px] font-label font-semibold text-primary tracking-tighter">智能感測活躍中</span>
<span class="material-symbols-outlined text-xs text-primary" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<!-- Date Marker -->
<div class="flex justify-center">
<span class="px-4 py-1 rounded-full bg-surface-container-low text-on-surface-variant text-[11px] font-medium tracking-wide">今天, 下午 2:45</span>
</div>
<!-- AI Message Cluster -->
<div class="flex flex-col items-start max-w-[85%] space-y-2">
<div class="bg-primary-container text-on-primary-container p-5 rounded-tr-xl rounded-tl-xl rounded-br-xl rounded-bl-sm shadow-sm leading-relaxed">
<p class="font-medium">Rou Rou, 今天感覺心裡重重的，還是比較輕鬆一點呢?</p>
</div>
<div class="bg-primary-container/40 text-on-primary-container p-4 rounded-tr-xl rounded-br-xl rounded-bl-sm text-sm">
<p>如果你想聊聊，我就在這裡聽你說喔。🌿</p>
</div>
</div>
<!-- User Message Cluster -->
<div class="flex flex-col items-end w-full space-y-2">
<div class="max-w-[80%] bg-secondary-container text-on-secondary-container p-5 rounded-tr-xl rounded-tl-xl rounded-bl-xl rounded-br-sm shadow-sm leading-relaxed">
<p>今天工作有點多，感覺有一點累，不知道該怎麼放鬆。</p>
</div>
</div>
<!-- AI Typing / Interaction State -->
<div class="flex items-center gap-3">
<div class="flex gap-1.5 p-3 rounded-2xl bg-surface-container-low">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40 animate-bounce"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/60 animate-bounce [animation-delay:-0.15s]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40 animate-bounce [animation-delay:-0.3s]"></div>
</div>
</div>
<!-- Asymmetric Assessment Insight (Floating Bento Style) -->
<div class="pt-4 pr-12">
<div class="bg-surface-container-lowest p-5 rounded-2xl border border-outline-variant/10 shadow-[0_8px_24px_rgba(41,52,58,0.06)] flex flex-col gap-3 max-w-[280px]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="text-xs font-semibold text-on-surface-variant tracking-tight">平靜時刻</span>
</div>
<p class="text-xs text-on-surface/80 leading-relaxed italic">「深呼吸三次，感覺空氣填滿胸膛的樣子。」</p>
<button class="text-[11px] font-bold text-primary flex items-center gap-1 mt-1">
                    開啟引導呼吸 <span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- Chat Input Section -->
<section class="bg-white/80 backdrop-blur-2xl px-6 pt-4 pb-10 flex flex-col gap-4">
<!-- Quick Responses -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container text-[13px] font-medium text-on-surface-variant border border-outline-variant/20 hover:bg-primary-container hover:text-on-primary-container transition-colors">有一點累</button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container text-[13px] font-medium text-on-surface-variant border border-outline-variant/20 hover:bg-primary-container hover:text-on-primary-container transition-colors">想聽故事</button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container text-[13px] font-medium text-on-surface-variant border border-outline-variant/20 hover:bg-primary-container hover:text-on-primary-container transition-colors">不想說話</button>
</div>
<div class="flex items-center gap-3">
<div class="flex-1 flex items-center bg-surface-container-low rounded-[2rem] px-5 py-3 gap-3 border border-outline-variant/10 focus-within:bg-white focus-within:shadow-inner transition-all">
<span class="material-symbols-outlined text-on-surface-variant/60" data-icon="sentiment_satisfied">sentiment_satisfied</span>
<input class="bg-transparent border-none focus:ring-0 text-[15px] w-full placeholder:text-on-surface-variant/40" placeholder="跟 Rou Rou 說說心事..." type="text"/>
<button class="text-primary-dim">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
</button>
</div>
<button class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary flex items-center justify-center shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</section>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl shadow-2xl">
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 rounded-full px-5 py-2 transition-all duration-500 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-emerald-500 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Reports</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-emerald-500 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person_2">person_2</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Settings</span>
</a>
</nav>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
    </style>
</body></html>
