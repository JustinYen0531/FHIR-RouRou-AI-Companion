<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="bg-white/70 backdrop-blur-xl sticky top-0 z-50 flex items-center justify-between px-6 py-4 w-full bg-gradient-to-b from-emerald-50/50 to-transparent shadow-[0_8px_24px_rgba(41,52,58,0.06)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Soft glowing ethereal orb with swirling green and blue light representing a supportive AI companion" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0e_-VVCa2wnzYFloPrdAzAj4jLIpdDvhE6oVt91DMiEoTIQJe_imIlMMAIHt8iMdL-79j2nLqfxcAEvZJ-P-U9ZcdJIePdmmD7DBPOi6XxlYnwKsvCzVW4ztZxdolUkHmkYd3KnZ3kmUZU5N-fWAwMbJufJ2PtzB7UfnfNeFkfsryKJLQb5jTRkseIKqLavWgTba20ZFXrTHKd-RbM2IlVtrUAas_BswGI0zht23vSdkfPojYCB_G3sbmMOFnaQjyLVwNVmqYisU"/>
</div>
<span class="text-emerald-900 font-bold tracking-tighter text-lg">Rou Rou</span>
</div>
<div class="text-emerald-800 transition-opacity hover:opacity-80">
<span class="material-symbols-outlined" data-icon="settings_heart">settings_heart</span>
</div>
</header>
<main class="flex-1 px-6 pt-8 pb-12 max-w-lg mx-auto w-full">
<!-- Energy Check-in Section -->
<section class="mb-10 text-center">
<div class="inline-block px-4 py-1.5 bg-secondary-container text-on-secondary-container rounded-full text-xs font-semibold mb-4 tracking-wide">
                ENERGY CHECK-IN
            </div>
<h1 class="text-3xl font-extrabold text-on-background leading-tight mb-4 px-4">
                今天還有體力跟我聊聊嗎?
            </h1>
<p class="text-on-surface-variant text-sm px-6 leading-relaxed">
                你的能量狀態會影響我們互動的方式。選一個最契合你當下心情的模式。
            </p>
</section>
<!-- Current Mode Indicator -->
<div class="mb-8 p-4 bg-surface-container-lowest rounded-3xl shadow-[0_8px_24px_rgba(41,52,58,0.04)] border border-outline-variant/10 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-2xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<div>
<p class="text-[10px] font-bold text-outline uppercase tracking-widest">目前設定模式</p>
<p class="font-bold text-on-surface">Soul Mate 靈魂伴侶</p>
</div>
</div>
<div class="pr-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
<!-- Mode Options Bento-ish Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Void Box -->
<button class="group relative flex items-center gap-5 p-5 bg-surface-container-low rounded-[2rem] text-left transition-all duration-300 hover:bg-white hover:shadow-xl hover:scale-[1.02]">
<div class="w-16 h-16 shrink-0 rounded-[1.5rem] bg-emerald-100 flex items-center justify-center text-emerald-800">
<span class="material-symbols-outlined text-3xl" data-icon="hole">circle</span>
</div>
<div>
<h3 class="font-bold text-lg text-on-surface mb-0.5">Void Box 樹洞模式</h3>
<p class="text-xs text-on-surface-variant leading-snug">只聽不說，讓我安靜地承接你所有的情緒與秘密。</p>
</div>
<div class="absolute right-6 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline">arrow_forward_ios</span>
</div>
</button>
<!-- Soul Mate (Active Highlight) -->
<button class="relative flex items-center gap-5 p-5 bg-primary-container rounded-[2rem] text-left ring-2 ring-primary ring-offset-4 ring-offset-surface">
<div class="w-16 h-16 shrink-0 rounded-[1.5rem] bg-white flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div>
<h3 class="font-bold text-lg text-on-primary-container mb-0.5">Soul Mate 靈魂伴侶</h3>
<p class="text-xs text-on-primary-container/80 leading-snug">充滿溫度的深度共感，像老朋友般溫暖你的心靈。</p>
</div>
<div class="absolute -top-2 -right-2 bg-primary text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-lg">
                    ACTIVE
                </div>
</button>
<!-- Mission Guide -->
<button class="group relative flex items-center gap-5 p-5 bg-surface-container-low rounded-[2rem] text-left transition-all duration-300 hover:bg-white hover:shadow-xl hover:scale-[1.02]">
<div class="w-16 h-16 shrink-0 rounded-[1.5rem] bg-orange-100 flex items-center justify-center text-orange-800">
<span class="material-symbols-outlined text-3xl" data-icon="explore">explore</span>
</div>
<div>
<h3 class="font-bold text-lg text-on-surface mb-0.5">Mission Guide 任務引導</h3>
<p class="text-xs text-on-surface-variant leading-snug">如果你感到迷茫，我將帶領你完成今日的心理復健練習。</p>
</div>
</button>
<div class="grid grid-cols-2 gap-4">
<!-- Option Selector -->
<button class="group p-5 bg-surface-container-low rounded-[2.5rem] text-center transition-all duration-300 hover:bg-white hover:shadow-xl">
<div class="w-12 h-12 mx-auto mb-3 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-800">
<span class="material-symbols-outlined text-2xl" data-icon="account_tree">account_tree</span>
</div>
<h3 class="font-bold text-sm text-on-surface mb-1">Option Selector</h3>
<p class="text-[10px] text-on-surface-variant leading-tight">結構化對話，減少思考負擔</p>
</button>
<!-- Smart Hunter -->
<button class="group p-5 bg-surface-container-low rounded-[2.5rem] text-center transition-all duration-300 hover:bg-white hover:shadow-xl">
<div class="w-12 h-12 mx-auto mb-3 rounded-2xl bg-purple-100 flex items-center justify-center text-purple-800">
<span class="material-symbols-outlined text-2xl" data-icon="target">target</span>
</div>
<h3 class="font-bold text-sm text-on-surface mb-1">Smart Hunter</h3>
<p class="text-[10px] text-on-surface-variant leading-tight">精準捕捉核心問題，高效解決困擾</p>
</button>
</div>
</div>
<div class="mt-12 text-center">
<button class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary py-5 rounded-full font-bold text-lg tracking-wide shadow-lg active:scale-95 transition-transform">
                開始今天的對話
            </button>
<p class="mt-4 text-xs text-outline font-medium">隨時可以在聊天中切換模式</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-white/80 backdrop-blur-2xl no-border shadow-[0_-4px_20px_rgba(0,0,0,0.03)] rounded-t-[2rem]">
<a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-emerald-500 transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Chat</span>
</a>
<a class="flex flex-col items-center justify-center bg-emerald-100 text-emerald-900 rounded-full px-5 py-2 transition-all duration-500 ease-in-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Reports</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-emerald-500 transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person_2">person_2</span>
<span class="font-manrope text-[11px] font-medium tracking-wide">Settings</span>
</a>
</nav>
</body></html>
